<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪙 雲端同步點數管理系統 (終極防卡版)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        body { background-color: #f4f6f9; font-family: "Microsoft JhengHei", sans-serif; }
        .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: none; margin-bottom: 20px; }
        .points-badge { font-size: 1.5rem; font-weight: bold; color: #0d6efd; }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); display:flex; justify-content:center; align-items:center; z-index:9999; transition: opacity 0.5s; }
        .password-modal, .edit-modal, .user-edit-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .log-deleted { background-color: #e9ecef !important; color: #6c757d !important; opacity: 0.75; }
        .log-deleted .text-secondary, .log-deleted .fw-bold { color: #6c757d !important; }
        .status-dot { inline-block; width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="text-center">
        <div class="spinner-border text-primary mb-2" role="status"></div>
        <div class="fw-bold">系統雲端連線中...</div>
        <small class="text-muted d-block mt-2">若卡住 3 秒後將自動強制進入</small>
    </div>
</div>

<div id="passwordModal" class="password-modal d-none">
    <div class="card p-4" style="width: 320px;">
        <h4 class="h5 fw-bold mb-3 text-danger">🛡️ 管理者權限驗證</h4>
        <p class="text-muted small">請輸入管理者密碼以切換主控台：</p>
        <input type="password" id="adminPasswordInput" class="form-control mb-3" placeholder="請輸入密碼" onkeypress="handlePasswordKey(event)">
        <div class="d-flex gap-2">
            <button class="btn btn-secondary w-50" onclick="cancelAdminSwitch()">取消</button>
            <button class="btn btn-danger w-50" onclick="verifyAdminPassword()">確認登入</button>
        </div>
    </div>
</div>

<div id="editModal" class="edit-modal d-none">
    <div class="card p-4" style="width: 360px;">
        <h4 class="h5 fw-bold mb-3 text-primary">✏️ 編輯點數紀錄</h4>
        <input type="hidden" id="editLogId">
        <input type="hidden" id="editLogUser">
        <input type="hidden" id="editLogOldPoints">
        <div class="mb-3">
            <label class="form-label small fw-bold">對象</label>
            <input type="text" id="editLogUserDisplay" class="form-control-plaintext fw-bold text-secondary ps-2" readonly>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">日期</label>
            <input type="date" id="editLogDate" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">事項說明</label>
            <input type="text" id="editLogTask" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">點數變更</label>
            <input type="number" id="editLogPoints" class="form-control" min="1">
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-secondary w-50" onclick="closeEditModal()">取消</button>
            <button class="btn btn-primary w-50" onclick="submitEditLog()">儲存修改</button>
        </div>
    </div>
</div>

<div id="userEditModal" class="user-edit-modal d-none">
    <div class="card p-4" style="width: 360px;">
        <h4 class="h5 fw-bold mb-3 text-primary">📝 修改點數申請</h4>
        <input type="hidden" id="userEditReqId">
        <div class="mb-3">
            <label class="form-label small fw-bold">日期</label>
            <input type="date" id="userEditReqDate" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">事項說明</label>
            <input type="text" id="userEditReqTask" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">想要累積的點數</label>
            <input type="number" id="userEditReqPoints" class="form-control" min="1">
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-secondary w-50" onclick="closeUserEditModal()">取消</button>
            <button class="btn btn-primary w-50" onclick="submitUserEditRequest()">儲存修改</button>
        </div>
    </div>
</div>

<div class="container py-4">
    <header class="pb-3 mb-4 border-bottom d-flex justify-content-between align-items-center">
        <span class="fs-4 fw-bold">☁️ 雲端點數集點管理系統 <span class="badge bg-primary fs-6 fw-normal">V3 終極完美版</span></span>
        <div class="btn-group" role="group">
            <input type="radio" class="btn-check" name="roleSwitch" id="roleUser" checked onclick="switchRole('user')">
            <label class="btn btn-outline-primary" for="roleUser">👤 使用者端</label>
            <input type="radio" class="btn-check" name="roleSwitch" id="roleAdmin" onclick="switchRole('admin')">
            <label class="btn btn-outline-primary" for="roleAdmin">⚙️ 管理者端</label>
        </div>
    </header>

    <div class="row">
        <div class="col-lg-8">
            <div id="userSection" class="section-block">
                <div class="card p-4">
                    <h3 class="card-title h5 mb-3 fw-bold text-primary">👤 使用者申請中心</h3>
                    <div class="mb-3">
                        <label class="form-label">您的帳號：</label>
                        <select class="form-select" id="userSelect" onchange="updateUserPointsView()">
                            <option value="王思琪">王思琪</option>
                        </select>
                    </div>
                    <div class="p-3 bg-light rounded mb-4 d-flex justify-content-between align-items-center">
                        <span>目前總點數：</span>
                        <span class="points-badge" id="userCurrentPoints">0 點</span>
                    </div>

                    <h4 class="h6 fw-bold mb-3">📝 提出點數累積申請</h4>
                    <form id="requestForm" onsubmit="submitRequest(event)">
                        <div class="mb-3">
                            <label class="form-label">日期</label>
                            <input type="date" class="form-control" id="reqDate" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">事項說明</label>
                            <input type="text" class="form-control" id="reqTask" placeholder="例如：完成指定進度" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">想要累積的點數</label>
                            <input type="number" class="form-control" id="reqPoints" min="1" value="1" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">送出申請</button>
                    </form>
                </div>

                <div class="card p-4">
                    <h3 class="card-title h5 mb-3 fw-bold text-secondary">⏳ 您目前的待審批申請</h3>
                    <div id="userPendingContainer"></div>
                </div>
            </div>

            <div id="adminSection" class="section-block d-none">
                <div class="card p-4">
                    <h3 class="card-title h5 mb-3 fw-bold text-danger">➕ 快速直接加點（不需審批）</h3>
                    <form onsubmit="directAddPoints(event)" class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">選擇對象</label>
                            <select class="form-select" id="directUserSelect">
                                <option value="王思琪">王思琪</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">增加點數</label>
                            <input type="number" class="form-control" id="directPoints" min="1" value="1" required>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">加點備註</label>
                            <input type="text" class="form-control" id="directReason" placeholder="例如：特別表現獎勵" required>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-danger">確認直接加點</button>
                        </div>
                    </form>
                </div>

                <div class="card p-4">
                    <h3 class="card-title h5 mb-3 fw-bold text-warning">📥 待處理的點數申請</h3>
                    <div id="pendingContainer"></div>
                </div>

                <div class="card p-4 border border-danger">
                    <h3 class="card-title h5 mb-3 fw-bold text-dark">🔑 管理者密碼設定</h3>
                    <form onsubmit="changeAdminPassword(event)" class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">輸入新密碼</label>
                            <input type="password" class="form-control" id="newPasswordInput" placeholder="請輸入新密碼" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">再次確認新密碼</label>
                            <input type="password" class="form-control" id="confirmPasswordInput" placeholder="請再次輸入新密碼" required>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-outline-danger">更新雲端密碼</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card p-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h3 class="card-title h6 fw-bold mb-0">📊 使用者點數總表</h3>
                    <div class="small text-muted d-flex align-items-center">
                        <span id="cloudStatusDot" class="status-dot bg-danger"></span>
                        <span id="cloudStatusText">未連線</span>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-sm table-striped align-middle">
                        <thead><tr><th>使用者</th><th>總點數</th></tr></thead>
                        <tbody id="totalPointsTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="card p-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="card-title h6 fw-bold mb-0">📜 全系統異動歷史紀錄</h3>
                    <button id="clearAllLogsBtn" class="btn btn-xs btn-danger py-0 px-1 d-none" style="font-size:0.75rem;" onclick="clearAllLogs()">🧨 清除所有紀錄</button>
                </div>
                <div style="max-height: 520px; overflow-y: auto;">
                    <ul class="list-group list-group-flush small" id="historyLogList"></ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// -------------------------------------------------------------
// ⚠️ 請把下方的 YOUR_DATABASE_URL 換成你的 Firebase 資料庫網址
// -------------------------------------------------------------
const firebaseConfig = {
    databaseURL: "https://points-system-5bd05-default-rtdb.firebaseio.com/" 
};

// 3秒強制作廢載入遮罩的保險機制
setTimeout(() => {
    const overlay = document.getElementById('loadingOverlay');
    if(overlay && !overlay.classList.contains('d-none')) {
        overlay.classList.add('d-none');
        console.log("⚠️ 已觸發安全機制：強制關閉載入遮罩。");
    }
}, 3000);

// 初始化 Firebase
try {
    firebase.initializeApp(firebaseConfig);
} catch(e) {
    console.error("Firebase 初始化失敗，請檢查網址格式：", e);
}
const db = firebase.database();
const rootRef = db.ref('points_system_v3');

let systemData = { totalPoints: { "王思琪": 0 }, pendingRequests: {}, historyLogs: {} };
let currentAdminPassword = "admin123"; 
let isAdminAuthenticated = false;

// 監聽雲端資料庫
rootRef.on('value', (snapshot) => {
    const data = snapshot.val();
    
    // 更新連線狀態燈為綠燈
    document.getElementById('cloudStatusDot').className = "status-dot bg-success";
    document.getElementById('cloudStatusText').innerText = "雲端同步中";

    if (data) {
        systemData.totalPoints = data.totalPoints || { "王思琪": 0 };
        systemData.pendingRequests = data.pendingRequests || {};
        systemData.historyLogs = data.historyLogs || {};
        currentAdminPassword = data.adminPassword || "admin123"; 
    } else {
        rootRef.set({ ...systemData, adminPassword: "admin123" });
    }
    
    // 關閉遮罩
    document.getElementById('loadingOverlay').classList.add('d-none');
    render();
}, (error) => {
    console.error("Firebase 讀取遭拒絕，請檢查安全規則(Rules)：", error);
    document.getElementById('cloudStatusText').innerText = "雲端拒絕連線";
    document.getElementById('loadingOverlay').classList.add('d-none');
});

// --- 🛡️ 密碼鎖防護邏輯 ---
function switchRole(role) {
    if (role === 'user') {
        isAdminAuthenticated = false; 
        document.getElementById('userSection').classList.remove('d-none');
        document.getElementById('adminSection').classList.add('d-none');
        document.getElementById('clearAllLogsBtn').classList.add('d-none');
        render(); 
    } else {
        if (!isAdminAuthenticated) {
            document.getElementById('passwordModal').classList.remove('d-none');
            document.getElementById('adminPasswordInput').focus();
        }
    }
}

function verifyAdminPassword() {
    const input = document.getElementById('adminPasswordInput').value;
    if (input === currentAdminPassword) {
        isAdminAuthenticated = true;
        document.getElementById('passwordModal').classList.add('d-none');
        document.getElementById('userSection').classList.add('d-none');
        document.getElementById('adminSection').classList.remove('d-none');
        document.getElementById('clearAllLogsBtn').classList.remove('d-none');
        document.getElementById('adminPasswordInput').value = '';
        render(); 
    } else {
        alert("❌ 密碼錯誤！");
        cancelAdminSwitch();
    }
}

function cancelAdminSwitch() {
    document.getElementById('passwordModal').classList.add('d-none');
    document.getElementById('adminPasswordInput').value = '';
    document.getElementById('roleUser').checked = true;
}

function handlePasswordKey(e) { if (e.key === 'Enter') { verifyAdminPassword(); } }

// --- ✏️ 管理者：紀錄編輯、🗑️ 刪除與 ↩️ 重新核可邏輯 ---
function openEditModal(id, user, date, task, points) {
    document.getElementById('editLogId').value = id;
    document.getElementById('editLogUser').value = user;
    document.getElementById('editLogUserDisplay').value = user;
    document.getElementById('editLogDate').value = date;
    document.getElementById('editLogTask').value = task;
    document.getElementById('editLogPoints').value = points;
    document.getElementById('editLogOldPoints').value = points; 
    document.getElementById('editModal').classList.remove('d-none');
}

function closeEditModal() { document.getElementById('editModal').classList.add('d-none'); }

function submitEditLog() {
    const id = document.getElementById('editLogId').value;
    const user = document.getElementById('editLogUser').value;
    const newDate = document.getElementById('editLogDate').value;
    const newTask = document.getElementById('editLogTask').value;
    const newPts = parseInt(document.getElementById('editLogPoints').value);
    const oldPts = parseInt(document.getElementById('editLogOldPoints').value);

    if (!newDate || !newTask || isNaN(newPts) || newPts < 1) {
        alert("❌ 請填寫完整欄位！");
        return;
    }

    const pointsDifference = newPts - oldPts;
    const currentTotalPts = systemData.totalPoints[user] || 0;

    rootRef.child(`totalPoints/${user}`).set(currentTotalPts + pointsDifference);
    rootRef.child(`historyLogs/${id}`).update({
        time: newDate, task: newTask, points: newPts
    }).then(() => {
        alert("🎉 紀錄已成功修改！");
        closeEditModal();
    });
}

function deleteLog(id, user, points, task, type) {
    if (confirm(`⚠️ 確定要將此筆紀錄標記為已刪除嗎？\n點數將會自動扣回 ${points} 點。`)) {
        const currentTotalPts = systemData.totalPoints[user] || 0;
        
        if(type !== '申請拒絕' && type !== '🚫 已刪除') {
            const updatedPoints = Math.max(0, currentTotalPts - points);
            rootRef.child(`totalPoints/${user}`).set(updatedPoints);
        }
        
        rootRef.child(`historyLogs/${id}`).update({ type: "🚫 已刪除" }).then(() => {
            alert("🗑️ 紀錄已成功變更為「已刪除」狀態！");
        });
    }
}

function reApproveRequest(id, user, points) {
    if (confirm(`❓ 確定要將此筆被拒絕的項目重新改為「批准」並補發 ${points} 點給 ${user} 嗎？`)) {
        const currentTotalPts = systemData.totalPoints[user] || 0;
        rootRef.child(`totalPoints/${user}`).set(currentTotalPts + points);
        rootRef.child(`historyLogs/${id}`).update({
            type: "申請核可",
            timestamp: Date.now()
        }).then(() => {
            alert("🎉 項目已重新批准並同步發放點數！");
        });
    }
}

function clearAllLogs() {
    if (confirm("🚨 【警告】確定要清除所有紀錄嗎？\n這會將所有人點數歸零，現存歷史紀錄將全面更新為「🚫 已刪除」狀態並予以保留。")) {
        let updates = {};
        Object.keys(systemData.totalPoints).forEach(user => { updates[`/totalPoints/${user}`] = 0; });
        Object.keys(systemData.historyLogs).forEach(id => { updates[`/historyLogs/${id}/type`] = "🚫 已刪除"; });

        rootRef.update(updates).then(() => { alert("🧨 全新系統資料已清理重置！"); });
    }
}

// --- 📝 使用者：自行修改與取消未批准申請的邏輯 ---
function openUserEditModal(id, date, task, points) {
    document.getElementById('userEditReqId').value = id;
    document.getElementById('userEditReqDate').value = date;
    document.getElementById('userEditReqTask').value = task;
    document.getElementById('userEditReqPoints').value = points;
    document.getElementById('userEditModal').classList.remove('d-none');
}

function closeUserEditModal() { document.getElementById('userEditModal').classList.add('d-none'); }

function submitUserEditRequest() {
    const id = document.getElementById('userEditReqId').value;
    const newDate = document.getElementById('userEditReqDate').value;
    const newTask = document.getElementById('userEditReqTask').value;
    const newPts = parseInt(document.getElementById('userEditReqPoints').value);

    if (!newDate || !newTask || isNaN(newPts) || newPts < 1) {
        alert("❌ 請填寫正確的欄位資訊！");
        return;
    }

    rootRef.child(`pendingRequests/${id}`).update({
        date: newDate, task: newTask, points: newPts
    }).then(() => {
        alert("✅ 申請資料已成功修改！");
        closeUserEditModal();
    });
}

function cancelRequest(id) {
    if (confirm("❓ 確定要取消這筆點數申請嗎？")) {
        rootRef.child(`pendingRequests/${id}`).remove().then(() => { alert("❌ 申請已成功撤銷！"); });
    }
}

// --- 🔑 更改密碼邏輯 ---
function changeAdminPassword(e) {
    e.preventDefault();
    const newPwd = document.getElementById('newPasswordInput').value;
    const confirmPwd = document.getElementById('confirmPasswordInput').value;
    if (newPwd !== confirmPwd) { alert("❌ 密碼不一致！"); return; }
    rootRef.child('adminPassword').set(newPwd).then(() => {
        alert("🎉 密碼已成功更新！");
        document.getElementById('newPasswordInput').value = '';
        document.getElementById('confirmPasswordInput').value = '';
    });
}

// --- 使用者送出申請 ---
function submitRequest(e) {
    e.preventDefault();
    const user = document.getElementById('userSelect').value;
    const date = document.getElementById('reqDate').value;
    const task = document.getElementById('reqTask').value;
    const points = parseInt(document.getElementById('reqPoints').value);

    const newRequestRef = rootRef.child('pendingRequests').push();
    newRequestRef.set({
        id: newRequestRef.key, user: user, date: date, task: task, points: points
    }).then(() => {
        alert(`✅ 申請已成功送出！`);
        document.getElementById('reqTask').value = '';
        document.getElementById('reqPoints').value = '1';
    });
}

// --- 管理者直接加點 ---
function directAddPoints(e) {
    e.preventDefault();
    const user = document.getElementById('directUserSelect').value;
    const points = parseInt(document.getElementById('directPoints').value);
    const reason = document.getElementById('directReason').value;
    const currentPts = systemData.totalPoints[user] || 0;
    
    const newLogRef = rootRef.child('historyLogs').push();
    newLogRef.set({
        id: newLogRef.key, time: todayDate(), user: user, task: reason, points: points, type: "管理者直加", timestamp: Date.now()
    });
    rootRef.child(`totalPoints/${user}`).set(currentPts + points);
    
    alert("🎉 雲端加點成功！");
    document.getElementById('directReason').value = '';
    document.getElementById('directPoints').value = '1';
}

// --- 管理者批准 / 拒絕 ---
function approveRequest(id, user, points, date, task) {
    const currentPts = systemData.totalPoints[user] || 0;
    const newLogRef = rootRef.child('historyLogs').push();
    newLogRef.set({
        id: newLogRef.key, time: date, user: user, task: task, points: points, type: "申請核可", timestamp: Date.now()
    });
    rootRef.child(`totalPoints/${user}`).set(currentPts + points);
    rootRef.child(`pendingRequests/${id}`).remove();
}

function rejectRequest(id, user, points, date, task) {
    if (confirm("❓ 確定要拒絕這筆申請嗎？拒絕後項目會歸檔到歷史紀錄中。")) {
        const newLogRef = rootRef.child('historyLogs').push();
        newLogRef.set({
            id: newLogRef.key, time: date, user: user, task: task, points: points, type: "申請拒絕", timestamp: Date.now()
        });
        rootRef.child(`pendingRequests/${id}`).remove();
    }
}
function todayDate() { return new Date().toISOString().split('T')[0]; }

// --- 介面渲染 ---
function render() {
    const currentUser = document.getElementById('userSelect').value;
    const pts = systemData.totalPoints[currentUser] !== undefined ? systemData.totalPoints[currentUser] : 0;
    document.getElementById('userCurrentPoints').innerText = pts + " 點";

    // 總表
    const tbody = document.getElementById('totalPointsTableBody');
    tbody.innerHTML = '';
    Object.entries(systemData.totalPoints).forEach(([user, pts]) => {
        tbody.innerHTML += `<tr><td><strong>${user}</strong></td><td><span class="text-primary fw-bold">${pts}</span> 點</td></tr>`;
    });

    const allRequests = Object.values(systemData.pendingRequests);

    // 1. 管理者端待審批渲染
    const pendingContainer = document.getElementById('pendingContainer');
    pendingContainer.innerHTML = '';
    if(allRequests.length === 0) {
        pendingContainer.innerHTML = `<p class="text-muted small text-center my-3">目前沒有待審批的請求。</p>`;
    } else {
        allRequests.forEach(req => {
            pendingContainer.innerHTML += `
                <div class="p-3 bg-light rounded mb-2 border-start border-warning border-3">
                    <div class="d-flex justify-content-between align-items-start mb-1">
                        <span class="fw-bold small">${req.user} <span class="text-muted">(${req.date})</span></span>
                        <span class="badge bg-warning text-dark">+${req.points} 點</span>
                    </div>
                    <p class="mb-2 small text-secondary">事項：${req.task}</p>
                    <div class="d-flex justify-content-end gap-2">
                        <button class="btn btn-sm btn-success py-0 px-2" onclick="approveRequest('${req.id}', '${req.user}', ${req.points}, '${req.date}', '${req.task}')">批准</button>
                        <button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="rejectRequest('${req.id}', '${req.user}', ${req.points}, '${req.date}', '${req.task}')">拒絕</button>
                    </div>
                </div>`;
        });
    }

    // 2. 使用者端「自己的待審批申請」渲染
    const userPendingContainer = document.getElementById('userPendingContainer');
    userPendingContainer.innerHTML = '';
    const myRequests = allRequests.filter(req => req.user === currentUser);
    if(myRequests.length === 0) {
        userPendingContainer.innerHTML = `<p class="text-muted small text-center my-2">目前沒有等待審核中的申請。</p>`;
    } else {
        myRequests.forEach(req => {
            userPendingContainer.innerHTML += `
                <div class="p-2 bg-white rounded mb-2 border border-1 d-flex justify-content-between align-items-center">
                    <div>
                        <div class="fw-bold small">${req.task} <span class="badge bg-light text-primary">+${req.points} 點</span></div>
                        <small class="text-muted">${req.date}</small>
                    </div>
                    <div>
                        <button class="btn btn-sm btn-outline-primary py-0 px-1 me-1" onclick="openUserEditModal('${req.id}', '${req.date}', '${req.task}', ${req.points})">✏️修改</button>
                        <button class="btn btn-sm btn-outline-danger py-0 px-1" onclick="cancelRequest('${req.id}')">❌取消</button>
                    </div>
                </div>`;
        });
    }

    // 3. 歷史紀錄渲染
    const logList = document.getElementById('historyLogList');
    logList.innerHTML = '';
    const sortedLogs = Object.values(systemData.historyLogs).sort((a, b) => b.timestamp - a.timestamp);
    if(sortedLogs.length === 0) {
        logList.innerHTML = `<li class="list-group-item text-muted text-center small py-3">暫無歷史異動紀錄</li>`;
    } else {
        sortedLogs.forEach(log => {
            let typeColor = 'text-success';
            let isDeletedMode = (log.type === "🚫 已刪除");
            let isRejectedMode = (log.type === "申請拒絕");
            
            if(log.type === '管理者直加') typeColor = 'text-danger';
            if(isRejectedMode) typeColor = 'text-muted fw-bold';
            
            let actionButtonsHtml = '';
            if (isAdminAuthenticated) {
                if (isDeletedMode) {
                    actionButtonsHtml = ''; 
                } else if (isRejectedMode) {
                    actionButtonsHtml = `
                        <button class="btn btn-sm btn-link text-success p-0 ms-2 small fw-bold" style="text-decoration:none;" onclick="reApproveRequest('${log.id}', '${log.user}', ${log.points})">↩️重新批准</button>
                        <button class="btn btn-sm btn-link text-danger p-0 ms-2 small" style="text-decoration:none;" onclick="deleteLog('${log.id}', '${log.user}', ${log.points}, '${log.task}', '${log.type}')">🗑️刪除</button>
                    `;
                } else {
                    actionButtonsHtml = `
                        <button class="btn btn-sm btn-link text-primary p-0 ms-2 small" style="text-decoration:none;" onclick="openEditModal('${log.id}', '${log.user}', '${log.time}', '${log.task}', ${log.points})">✏️編輯</button>
                        <button class="btn btn-sm btn-link text-danger p-0 ms-2 small" style="text-decoration:none;" onclick="deleteLog('${log.id}', '${log.user}', ${log.points}, '${log.task}', '${log.type}')">🗑️刪除</button>
                    `;
                }
            }
            
            logList.innerHTML += `
                <li class="list-group-item px-0 py-2 d-flex justify-content-between align-items-start ${isDeletedMode ? 'log-deleted' : ''}">
                    <div class="ms-2 me-auto">
                        <div class="fw-bold">${log.user} <span class="badge bg-light text-muted fw-normal">${log.time}</span>${actionButtonsHtml}</div>
                        <span class="text-secondary">${log.task}</span> <span class="small ${typeColor}">(${log.type})</span>
                    </div>
                    <span class="badge ${isDeletedMode ? 'bg-light text-muted' : (isRejectedMode ? 'bg-danger':'bg-secondary')} rounded-pill">${isDeletedMode ? '0':'+'+log.points}</span>
                </li>`;
        });
    }
}

function updateUserPointsView() { render(); }
document.getElementById('reqDate').value = todayDate();
</script>
</body>
</html>
